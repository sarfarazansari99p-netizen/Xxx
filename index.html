<style>
:root {
    --primary: #ff00ff;
    --secondary: #7000ff;
    --bg-dark: #000000;
    --glass-border: rgba(255, 0, 255, 0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }

body {
    width: 100vw; height: 100vh;
    background-color: var(--bg-dark);
    display: flex; align-items: center; justify-content: center;

    font-family: 'Rajdhani', sans-serif;

#canvas-container {
    position: fixed; inset: 0; z-index: 1;

.kz-login {
    position: relative; z-index: 10;
    width: 90%; max-width: 420px;
    padding: 55px 45px;
    background: rgba(10, 0, 15, 0.85);
    backdrop-filter: blur(25px);
    border: 2px solid var(--glass-border);
    box-shadow: 0 0 60px rgba(0, 0, 0, 1);
    text-align: center;
    overflow: hidden; 
    /* Optimización de hardware para el movimiento 3D */
    will-change: transform;
    transform-style: preserve-3d;
}

/* Efecto de Escáner */
.kz-login::after {
    content: "";
    position: absolute; top: -100%; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(to bottom, transparent, rgba(255, 0, 255, 0.15), transparent);
    animation: scanning-box 3s linear infinite;
    pointer-events: none;
    z-index: 11;
}

@keyframes scanning-box {
    0% { top: -100%; }
    100% { top: 100%; }
}

@keyframes flicker {
    0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 15px var(--primary); }
    20%, 24%, 55% { opacity: 0.3; text-shadow: none; }
}

.corner-decor { position: absolute; width: 15px; height: 15px; border: 2px solid var(--primary); z-index: 12; pointer-events: none; }
.top-l { top: 0; left: 0; border-right: 0; border-bottom: 0; }
.top-r { top: 0; right: 0; border-left: 0; border-bottom: 0; }
.bot-l { bottom: 0; left: 0; border-right: 0; border-top: 0; }
.bot-r { bottom: 0; right: 0; border-left: 0; border-top: 0; }

.logo-area { margin-bottom: 45px; position: relative; z-index: 13; }
.logo-area h1 { font-family: 'Orbitron', sans-serif; font-size: 34px; letter-spacing: 6px; font-weight: 900; }
.logo-area h1 span { color: var(--primary); animation: flicker 3s infinite; }

.input-group { text-align: left; margin-bottom: 25px; position: relative; z-index: 13; }
.input-group label { font-size: 10px; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 2px; font-weight: 800; }

.input-box { position: relative; }
.input-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }
.input-box input {
    width: 100%; padding: 15px 15px 15px 50px;
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid rgba(255, 0, 255, 0.3);
    color: #fff; outline: none;
}

.btn-login {
    width: 100%; padding: 18px; border: none;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: #fff; font-family: 'Orbitron', sans-serif; font-weight: 900;
    text-transform: uppercase; letter-spacing: 4px; cursor: pointer; 
    position: relative; z-index: 13;
}

.create-account-link { display: block; color: #888; text-decoration: none; font-size: 12px; margin: 20px 0; position: relative; z-index: 13; }
.create-account-link span { color: var(--primary); font-weight: bold; }

.social-grid { display: flex; gap: 10px; margin-top: 20px; position: relative; z-index: 13; }
.social-btn { flex: 1; padding: 12px; text-decoration: none; color: #fff; font-size: 10px; border: 1px solid rgba(255, 0, 255, 0.2); background: rgba(0, 0, 0, 0.5); text-align: center; }
</style>
<script>
    function removeExisting() {
        const idsToRemove = ['root', '__framer-badge-container'];

        idsToRemove.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.remove();
        });

        const classBasedRoot = document.querySelector('div.stack_s1n8l1x5.button_blajnuz');
        if (classBasedRoot) classBasedRoot.remove();

        const meta = document.querySelector('meta[name="robots"][content="noindex"]');
        if (meta) meta.remove();
    }

    document.addEventListener('DOMContentLoaded', () => {
        removeExisting();
        const observer = new MutationObserver((mutations) => {
            for (const mutation of mutations) {
                for (const node of mutation.addedNodes) {
                    if (
                        node.tagName === 'META' &&
                        node.getAttribute('name') === 'robots' &&
                        node.getAttribute('content') === 'noindex'
                    ) node.remove();
                }
            }
        });
        observer.observe(document, { childList: true, subtree: true });
    });
</script>

<script>
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d', { alpha: false }); // Optimización: desactivar transparencia del canvas
let fragmentos = [];
let puntos = [];
let explosions = [];
let w, h;

function setSize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', setSize);
setSize();

class Spark {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.size = Math.random() * 2;
        this.speedX = (Math.random() - 0.5) * 8;
        this.speedY = (Math.random() - 0.5) * 8;
        this.life = 1.0;
    }
    update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.04; }
    draw() {
        ctx.fillStyle = `rgba(255, 0, 255, ${this.life})`;
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

class Punto {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.speedX = (Math.random() - 0.5) * 1.2;
        this.speedY = (Math.random() - 0.5) * 1.2;
    }
    update() {
        this.x += this.speedX; this.y += this.speedY;
        if (this.x > w || this.x < 0 || this.y > h || this.y < 0) this.reset();
    }
    draw() {
        ctx.fillStyle = "#ff00ff";
        ctx.beginPath(); ctx.arc(this.x, this.y, 1.8, 0, 6.28); ctx.fill();
    }
}

class Fragmento {
    constructor() { this.size = Math.random() * 5 + 4; this.reset(); }
    reset() {
        this.x = Math.random() * w;
        this.y = h + 50;
        this.speedY = -(Math.random() * 2 + 0.5);
        this.speedX = (Math.random() - 0.5) * 0.8;
        this.angle = Math.random() * 6.28;
    }
    update() {
        this.y += this.speedY; this.x += this.speedX;
        this.angle += 0.03;
        if (this.y < -50) this.reset();
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
        ctx.shadowBlur = 8; ctx.shadowColor = "#ff00ff"; ctx.fillStyle = "#ff00ff";
        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        ctx.restore();
    }
}

function drawLaser(x1, y1, x2, y2, opacity) {
    ctx.strokeStyle = `rgba(255, 0, 255, ${opacity})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
}

function init() {
    fragmentos = []; puntos = [];
    for (let i = 0; i < 18; i++) fragmentos.push(new Fragmento());
    for (let i = 0; i < 45; i++) puntos.push(new Punto());
}

function animate() {
    // Dibujamos un fondo negro sólido en lugar de limpiar (es más rápido)
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);

    // Optimización de Rayos entre puntos (Distancia al cuadrado para evitar Math.hypot)
    for (let i = 0; i < puntos.length; i++) {
        const p1 = puntos[i];
        for (let j = i + 1; j < puntos.length; j++) {
            const p2 = puntos[j];
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const distSq = dx*dx + dy*dy;
            if (distSq < 22500) { // 22500 = 150*150
                drawLaser(p1.x, p1.y, p2.x, p2.y, 1 - Math.sqrt(distSq)/150);
            }
        }
    }

    // Rayos entre cubos + explosión (Optimizado)
    for (let i = 0; i < fragmentos.length; i++) {
        const f1 = fragmentos[i];
        for (let j = i + 1; j < fragmentos.length; j++) {
            const f2 = fragmentos[j];
            const dx = f1.x - f2.x;
            const dy = f1.y - f2.y;
            const distSq = dx*dx + dy*dy;
            if (distSq < 10000) { // 100*100
                drawLaser(f1.x, f1.y, f2.x, f2.y, 1 - Math.sqrt(distSq)/100);
            }
            if (distSq < 225) { // 15*15
                for(let k=0; k<8; k++) explosions.push(new Spark(f1.x, f1.y));
                f1.reset(); f2.reset();
            }
        }
    }

    puntos.forEach(p => { p.update(); p.draw(); });
    fragmentos.forEach(f => { f.update(); f.draw(); });
    
    // Filtramos explosiones de forma eficiente
    for (let i = explosions.length - 1; i >= 0; i--) {
        const e = explosions[i];
        e.update();
        if (e.life <= 0) {
            explosions.splice(i, 1);
        } else {
            e.draw();
        }
    }

    requestAnimationFrame(animate);
}

init(); animate();

// Throttling para el movimiento 3D (evita recalcular en cada micro-movimiento)
let ticking = false;
document.addEventListener('mousemove', (e) => {
    if (!ticking) {
        window.requestAnimationFrame(() => {
            const card = document.getElementById('main-card');
            let x = (w / 2 - e.pageX) / 45;
            let y = (h / 2 - e.pageY) / 45;
            card.style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
            ticking = false;
        });
        ticking = true;
    }
});
</script>
